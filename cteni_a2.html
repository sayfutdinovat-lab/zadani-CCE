// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderAnoNeQ(q,exId){
  return `<div class="question" data-correct="${q.c}">
    <p class="q-txt">${q.t}</p>
    <div class="opts">
      <button data-answer="ANO">ANO</button>
      <button data-answer="NE">NE</button>
    </div>
    <div class="fb"></div>
  </div>`;
}

function renderMultiQ(q,exId){
  const keys=Object.keys(q.opts);
  const btns=keys.map(k=>`<button data-answer="${k}">${k}) ${esc(q.opts[k])}</button>`).join('');
  return `<div class="question" data-correct="${q.c}">
    <p class="q-txt">${q.t}</p>
    <div class="opts">${btns}</div>
    <div class="fb"></div>
  </div>`;
}

function renderText12Q(q,ex){
  const lbl1=ex.t1lbl||'Text 1';const lbl2=ex.t2lbl||'Text 2';
  return `<div class="question" data-correct="${q.c}" data-t1="${lbl1}" data-t2="${lbl2}">
    <p class="q-txt">${q.t}</p>
    <div class="opts">
      <button data-answer="T1">Text 1</button>
      <button data-answer="T2">Text 2</button>
    </div>
    <div class="fb"></div>
  </div>`;
}

function renderRevealQ(q,exId){
  const eid=`rv-${exId}-${Math.random().toString(36).slice(2,7)}`;
  return `<div class="question reveal-q">
    <p class="q-txt">${q.t}</p>
    <button class="reveal-btn" onclick="doReveal(this,'${esc(q.a)}')">Zobrazit odpověď</button>
    <div class="fb"></div>
  </div>`;
}

function renderMatchQ(q,persons,txt){
  const keys=Object.keys(persons);
  const btns=keys.map(k=>`<button data-answer="${k}">${k}</button>`).join('');
  return `<div class="question" data-correct="${q.c}">
    <div class="txt-box" style="margin-bottom:6px"><div class="txt-box-lbl">${esc(txt.lbl)}</div><p>${esc(txt.txt)}</p></div>
    <p class="q-txt" style="font-size:.8rem;color:var(--muted);margin-bottom:6px">${esc(q.t)}</p>
    <div class="opts">${btns}</div>
    <div class="fb"></div>
  </div>`;
}

function renderPersonsBox(persons){
  const rows=Object.entries(persons).map(([k,v])=>`<div class="person-row"><span class="p-key">${k}</span>${esc(v)}</div>`).join('');
  return `<div class="persons-box"><div class="persons-box-lbl">Profily osob (jedna je navíc):</div>${rows}</div>`;
}

function renderExercise(ex){
  let qsHtml='<div class="questions">';

  if(ex.type==='ano-ne'){
    if(ex.groups){
      ex.groups.forEach(g=>{
        qsHtml+=`<div class="q-group"><div class="q-group-lbl">${esc(g.lbl)}</div>`;
        g.qs.forEach(q=>{qsHtml+=renderAnoNeQ(q,ex.id);});
        qsHtml+='</div>';
      });
    } else {
      ex.qs.forEach(q=>{qsHtml+=renderAnoNeQ(q,ex.id);});
    }
  } else if(ex.type==='multi'){
    ex.qs.forEach(q=>{qsHtml+=renderMultiQ(q,ex.id);});
  } else if(ex.type==='text12'){
    ex.qs.forEach(q=>{qsHtml+=renderText12Q(q,ex);});
  } else if(ex.type==='reveal'){
    ex.qs.forEach(q=>{qsHtml+=renderRevealQ(q,ex.id);});
  } else if(ex.type==='match'){
    ex.qs.forEach((q,i)=>{qsHtml+=renderMatchQ(q,ex.persons,ex.txts[i]);});
  }
  qsHtml+='</div>';

  let bodyHtml='';
  if(ex.text) bodyHtml+=`<div class="read-txt">${ex.text}</div>`;
  if(ex.textNote) bodyHtml+=`<div class="text-note">${ex.textNote}</div>`;
  if(ex.instr) bodyHtml+=`<div class="instruction">${esc(ex.instr)}</div>`;
  if(ex.type==='match') bodyHtml+=renderPersonsBox(ex.persons);

  return `<div class="ex-block" id="exb-${ex.id}" data-ok="0" data-tot="0">
    <div class="ex-hdr">
      <div>
        <div class="ex-src">${esc(ex.src)}</div>
        <div class="ex-title">${esc(ex.title)}</div>
      </div>
      <div class="score-badge"><span class="sc-disp">0 / 0</span></div>
    </div>
    ${bodyHtml}
    ${qsHtml}
    <div class="ex-foot">
      <span class="score-txt">Správně: <strong class="sc-disp2">0</strong> z <strong class="sc-tot">0</strong></span>
      <button class="reset-btn" onclick="resetBlock('exb-${ex.id}')">↺ Zkusit znovu</button>
    </div>
  </div>`;
}

function buildPage(){
  const nav=document.getElementById('topicNav');
  const main=document.getElementById('main');
  TOPICS.forEach((topic,ti)=>{
    // Tab
    const btn=document.createElement('button');
    btn.className='tab-btn'+(ti===0?' active':'');
    btn.dataset.topic=topic.id;
    btn.textContent=topic.icon+' '+topic.lbl;
    btn.onclick=()=>showTopic(topic.id);
    nav.appendChild(btn);

    // Section
    const sec=document.createElement('section');
    sec.id='topic-'+topic.id;
    sec.className='topic-sec'+(ti===0?' active':'');
    let inner=`<div class="topic-head"><h2>${topic.icon} ${esc(topic.title)}</h2><p>${esc(topic.desc)}</p></div>`;
    topic.exercises.forEach(ex=>{inner+=renderExercise(ex);});
    sec.innerHTML=inner;
    main.appendChild(sec);
  });
}

function showTopic(id){
  document.querySelectorAll('.topic-sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const sec=document.getElementById('topic-'+id);
  if(sec) sec.classList.add('active');
  const btn=document.querySelector(`.tab-btn[data-topic="${id}"]`);
  if(btn){btn.classList.add('active');btn.scrollIntoView({block:'nearest',inline:'center'});}
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════
function updateBlockScore(block,isOk){
  const ok=parseInt(block.dataset.ok||0)+(isOk?1:0);
  const tot=parseInt(block.dataset.tot||0)+1;
  block.dataset.ok=ok;block.dataset.tot=tot;
  block.querySelectorAll('.sc-disp').forEach(el=>el.textContent=ok+' / '+tot);
  block.querySelectorAll('.sc-disp2').forEach(el=>el.textContent=ok);
  block.querySelectorAll('.sc-tot').forEach(el=>el.textContent=tot);
}

document.addEventListener('DOMContentLoaded',()=>{
  buildPage();
  document.addEventListener('click',function(e){
    const btn=e.target;
    if(!btn.dataset||!btn.dataset.answer) return;
    const q=btn.closest('.question');
    if(!q||q.dataset.answered) return;
    const correct=q.dataset.correct;
    const selected=btn.dataset.answer;
    const isOk=selected===correct;
    q.dataset.answered='true';
    q.querySelectorAll('[data-answer]').forEach(b=>{
      b.disabled=true;
      if(b.dataset.answer===correct) b.classList.add('ok');
    });
    if(!isOk) btn.classList.add('wrong');
    const fb=q.querySelector('.fb');
    if(fb){
      let msg='';
      if(isOk){msg='✓ Správně!';fb.className='fb ok';}
      else{
        let ans=correct;
        if(q.dataset.t1&&correct==='T1') ans=q.dataset.t1;
        if(q.dataset.t2&&correct==='T2') ans=q.dataset.t2;
        msg='✗ Špatně. Správná odpověď: '+ans;fb.className='fb wrong';
      }
      fb.textContent=msg;
    }
    const block=q.closest('.ex-block');
    if(block) updateBlockScore(block,isOk);
  });
});

function doReveal(btn,answer){
  const q=btn.closest('.reveal-q');
  if(!q) return;
  btn.style.display='none';
  const fb=q.querySelector('.fb');
  if(fb){fb.className='fb reveal';fb.textContent='✓ Správná odpověď: '+answer;}
}

function resetBlock(id){
  const block=document.getElementById(id);
  if(!block) return;
  block.dataset.ok='0';block.dataset.tot='0';
  block.querySelectorAll('.sc-disp').forEach(el=>el.textContent='0 / 0');
  block.querySelectorAll('.sc-disp2').forEach(el=>el.textContent='0');
  block.querySelectorAll('.sc-tot').forEach(el=>el.textContent='0');
  block.querySelectorAll('.question').forEach(q=>{
    delete q.dataset.answered;
    q.querySelectorAll('[data-answer]').forEach(b=>{b.disabled=false;b.classList.remove('ok','wrong');});
    const fb=q.querySelector('.fb');
    if(fb){fb.className='fb';fb.textContent='';}
  });
  block.querySelectorAll('.reveal-btn').forEach(b=>b.style.display='');
  block.querySelectorAll('.fb.reveal').forEach(fb=>{fb.className='fb';fb.textContent='';});
}
</script>
